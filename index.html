<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3쿠션 당구 - 파이브 앤 하프 시스템 시뮬레이터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
    overflow: hidden;
  }
  h1 { margin-bottom: 8px; font-size: 1.3rem; letter-spacing: 1px; }
  #info-panel {
    display: flex; gap: 24px; margin-bottom: 8px; font-size: 0.9rem;
    background: rgba(255,255,255,0.08); padding: 8px 20px; border-radius: 8px;
  }
  #info-panel span { font-weight: bold; color: #ffd700; }
  canvas { border-radius: 6px; cursor: crosshair; }
  #help { margin-top: 8px; font-size: 0.78rem; color: #999; }
  .legend { display: flex; gap: 16px; margin-top: 4px; font-size: 0.78rem; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>

<h1>3쿠션 파이브 앤 하프 시스템 시뮬레이터</h1>

<div id="info-panel">
  <div>수구(연장선): <span id="val-cue">-</span></div>
  <div>1쿠션: <span id="val-c1">-</span></div>
  <div>3쿠션: <span id="val-c3">-</span></div>
  <div>공식: <span id="val-formula">수구 − 1쿠션 = 3쿠션</span></div>
</div>

<canvas id="table"></canvas>

<div id="help">드래그로 수구 이동 · 마우스로 겨냥 방향 설정 · 클릭으로 겨냥점 고정/해제</div>
<div class="legend">
  <span><i style="background:#88ccff"></i>수구 포인트</span>
  <span><i style="background:#ffcc44"></i>1쿠션 포인트</span>
  <span><i style="background:#ff8888"></i>3쿠션 포인트</span>
  <span><i style="background:#ff4444"></i>궤적</span>
  <span><i style="background:rgba(0,180,255,0.7)"></i>연장선</span>
</div>

<script>
// ============================================================
//  파이브 앤 하프 시스템 (Five & Half System)
//
//  당구대 배치도 (위에서 내려다 본 모습, 2:1 비율):
//
//  ← ──── 1쿠션 (상단 장쿠션, 우→좌) ──── →
//  TL  50───40───30───20───10───0  TR
//  │                                │  90  ↑ 수구 (우측 단쿠션)
//  │                                │  80    (하→상, 10단위)
//  │  2쿠션 (좌측 단쿠션)           │  70
//  │                                │  60
//  BL  0───10───20───30───40───50  BR  50  ← 수구 기준점 (코너=50)
//  ← ──── 3쿠션 (하단 장쿠션, 좌→우) ──── →
//      ← 수구연장: 45─40─35─30─25─20─15─10 (5단위)
//
//  공식: 수구(연장선) − 1쿠션 = 3쿠션
//  경로: 수구 → 1쿠션(상단) → 2쿠션(좌측) → 3쿠션(하단)
//
//  핵심: 수구 값은 공 위치가 아닌, 조준선을 뒤로 연장하여
//        레일과 만나는 교점의 포인트 값으로 결정됩니다.
// ============================================================

const canvas = document.getElementById('table');
const ctx = canvas.getContext('2d');

// --- 당구대 크기 ---
const TABLE_W = 800;   // 내부 폭 (장쿠션 방향)
const TABLE_H = 400;   // 내부 높이 (단쿠션 방향)
const CUSHION = 28;
const RAIL = 18;
const PADDING = 40;

canvas.width  = TABLE_W + (CUSHION + RAIL) * 2 + PADDING * 2;
canvas.height = TABLE_H + (CUSHION + RAIL) * 2 + PADDING * 2;

// 내부 필드 원점
const OX = PADDING + RAIL + CUSHION;
const OY = PADDING + RAIL + CUSHION;

// 코너 좌표
const TR = { x: OX + TABLE_W, y: OY };
const TL = { x: OX,           y: OY };
const BR = { x: OX + TABLE_W, y: OY + TABLE_H };
const BL = { x: OX,           y: OY + TABLE_H };

// 색상
const C_RAIL    = '#5a3a1a';
const C_CUSHION = '#2d8c3c';
const C_FELT    = '#1b7a30';
const C_LINE    = '#1a6b28';
const C_TRAJ1   = '#ff4444';
const C_TRAJ2   = '#ffaa00';
const C_TRAJ3   = '#ff6666';
const C_EXT     = 'rgba(0, 180, 255, 0.6)';
const C_AIM     = 'rgba(255, 255, 80, 0.45)';

const BALL_R = 10;

// ============================================================
//  포인트 생성
// ============================================================

function buildPts(p0, p1, values) {
  const pts = [];
  const n = values.length - 1;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push({
      x: p0.x + (p1.x - p0.x) * t,
      y: p0.y + (p1.y - p0.y) * t,
      val: values[i]
    });
  }
  return pts;
}

// --- 1쿠션 포인트 (상단 장쿠션, 우→좌: 0 ~ 50) ---
const c1Points = buildPts(TR, TL, [0, 10, 20, 30, 40, 50]);

// --- 3쿠션 포인트 (하단 장쿠션, 좌→우: 0 ~ 50) ---
const c3Points = buildPts(BL, BR, [0, 10, 20, 30, 40, 50]);

// --- 수구 포인트: 우측 단쿠션 (하→상: 50 ~ 90) ---
const cueRight = buildPts(BR, TR, [50, 60, 70, 80, 90]);

// --- 수구 포인트: 하단 장쿠션 (우→좌: 50 ~ 10, 5단위) ---
const cueBottom = buildPts(BR, BL, [50, 45, 40, 35, 30, 25, 20, 15, 10]);

// 수구 전체 폴리라인 (값 증가 순: 하단 10→50 + 우측 50→90)
// 하단은 BL(10) → BR(50), 우측은 BR(50) → TR(90)
const cuePolyline = [
  ...cueBottom.slice().reverse(),   // BL(10) → BR(50)
  ...cueRight.slice(1)               // BR(60) → TR(90)
];

// ============================================================
//  수구 상태
// ============================================================

let cueBall = { x: BR.x - 40, y: BR.y - 80 };
let isDragging = false;
let aimLocked = false;
let mousePos = { x: 0, y: 0 };

// ============================================================
//  당구대 그리기
// ============================================================

function drawTable() {
  // 레일
  ctx.fillStyle = C_RAIL;
  roundRect(ctx, PADDING, PADDING,
    TABLE_W + (CUSHION + RAIL) * 2,
    TABLE_H + (CUSHION + RAIL) * 2, 10);
  ctx.fill();

  // 쿠션
  ctx.fillStyle = C_CUSHION;
  ctx.fillRect(PADDING + RAIL, PADDING + RAIL,
    TABLE_W + CUSHION * 2, TABLE_H + CUSHION * 2);

  // 필드
  ctx.fillStyle = C_FELT;
  ctx.fillRect(OX, OY, TABLE_W, TABLE_H);

  // 중앙 세로선
  ctx.strokeStyle = C_LINE;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(OX + TABLE_W / 2, OY);
  ctx.lineTo(OX + TABLE_W / 2, OY + TABLE_H);
  ctx.stroke();

  // 다이아몬드 마커 (레일 위 장식)
  drawDiamonds();
}

function drawDiamonds() {
  ctx.fillStyle = '#f0e6c0';
  const d = 3;
  // 상단/하단 장쿠션: 8등분 (7개 마커)
  for (let i = 1; i < 8; i++) {
    const x = OX + (TABLE_W / 8) * i;
    diamond(x, PADDING + RAIL / 2, d);
    diamond(x, OY + TABLE_H + CUSHION + RAIL / 2, d);
  }
  // 좌측/우측 단쿠션: 4등분 (3개 마커)
  for (let i = 1; i < 4; i++) {
    const y = OY + (TABLE_H / 4) * i;
    diamond(PADDING + RAIL / 2, y, d);
    diamond(OX + TABLE_W + CUSHION + RAIL / 2, y, d);
  }
}

function diamond(cx, cy, s) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - s); ctx.lineTo(cx + s, cy);
  ctx.lineTo(cx, cy + s); ctx.lineTo(cx - s, cy);
  ctx.closePath(); ctx.fill();
}

// ============================================================
//  포인트 라벨 그리기
// ============================================================

function drawPointSet(pts, color, labelSide) {
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const p of pts) {
    // 점
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    // 라벨
    let lx = p.x, ly = p.y;
    if (labelSide === 'above')  ly -= 14;
    if (labelSide === 'below')  ly += 14;
    if (labelSide === 'left')   lx -= 16;
    if (labelSide === 'right')  lx += 16;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(p.val, lx, ly);
  }
}

// ============================================================
//  수구 그리기
// ============================================================

function drawCueBall() {
  ctx.beginPath();
  ctx.arc(cueBall.x + 2, cueBall.y + 2, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  const g = ctx.createRadialGradient(
    cueBall.x - 3, cueBall.y - 3, 1, cueBall.x, cueBall.y, BALL_R);
  g.addColorStop(0, '#fff');
  g.addColorStop(1, '#ccc');
  ctx.beginPath();
  ctx.arc(cueBall.x, cueBall.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ============================================================
//  핵심 계산 함수들
// ============================================================

/**
 * 폴리라인 위로 점을 투영하여 보간된 포인트 값 반환
 */
function projectOntoPolyline(px, py, pts) {
  let best = Infinity, val = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const ax = pts[i].x, ay = pts[i].y;
    const bx = pts[i + 1].x, by = pts[i + 1].y;
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    let t = len2 === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const d = Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
    if (d < best) {
      best = d;
      val = pts[i].val + t * (pts[i + 1].val - pts[i].val);
    }
  }
  return val;
}

/**
 * 직선(sx,sy → dx,dy 방향)이 테이블 경계와 만나는 첫 번째 점
 * excludeEdge: 출발 쿠션을 제외
 */
function rayCushionHit(sx, sy, dx, dy, excludeEdge) {
  let bestT = Infinity, hit = null;
  const edges = [
    { name: 'top',    cond: dy < 0, t: (OY - sy) / dy },
    { name: 'bottom', cond: dy > 0, t: (OY + TABLE_H - sy) / dy },
    { name: 'left',   cond: dx < 0, t: (OX - sx) / dx },
    { name: 'right',  cond: dx > 0, t: (OX + TABLE_W - sx) / dx },
  ];
  for (const e of edges) {
    if (!e.cond || e.name === excludeEdge) continue;
    const t = e.t;
    if (t < 0.001 || t >= bestT) continue;
    const hx = sx + dx * t, hy = sy + dy * t;
    const inX = hx >= OX - 0.1 && hx <= OX + TABLE_W + 0.1;
    const inY = hy >= OY - 0.1 && hy <= OY + TABLE_H + 0.1;
    if ((e.name === 'top' || e.name === 'bottom') && inX) {
      bestT = t; hit = { x: hx, y: (e.name === 'top' ? OY : OY + TABLE_H), edge: e.name };
    }
    if ((e.name === 'left' || e.name === 'right') && inY) {
      bestT = t; hit = { x: (e.name === 'left' ? OX : OX + TABLE_W), y: hy, edge: e.name };
    }
  }
  return hit;
}

/**
 * 수구 → 마우스 방향으로 쏘았을 때 1쿠션(상단) 히트 지점
 */
function calcFirstCushionHit(bx, by, mx, my) {
  const dx = mx - bx, dy = my - by;
  if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return null;
  return rayCushionHit(bx, by, dx, dy, null);
}

/**
 * 1쿠션 히트 좌표 → 1쿠션 포인트 값 (상단 장쿠션만 유효)
 */
function calcC1Value(hit) {
  if (!hit || hit.edge !== 'top') return null;
  return projectOntoPolyline(hit.x, hit.y, c1Points);
}

/**
 * ★ 핵심: 연장선 기반 수구 값 계산
 *
 * 수구(cueBall)와 1쿠션 히트 지점을 잇는 직선을 뒤쪽(반대 방향)으로 연장하여
 * 이 선이 우측 단쿠션 또는 하단 장쿠션과 만나는 교점의 포인트 값을 반환합니다.
 */
function calcCueValueByExtension(bx, by, c1x, c1y) {
  // 조준 방향의 역방향 (뒤쪽으로 연장)
  const dx = bx - c1x;
  const dy = by - c1y;

  // 우측 단쿠션 (x = OX + TABLE_W) 과의 교점
  let hitRight = null;
  if (dx > 0.001) {
    const t = (OX + TABLE_W - bx) / dx;
    if (t > -0.001) {
      const hy = by + dy * t;
      if (hy >= OY && hy <= OY + TABLE_H) {
        hitRight = { x: OX + TABLE_W, y: hy, t: Math.abs(t) };
      }
    }
  }

  // 하단 장쿠션 (y = OY + TABLE_H) 과의 교점
  let hitBottom = null;
  if (dy > 0.001) {
    const t = (OY + TABLE_H - by) / dy;
    if (t > -0.001) {
      const hx = bx + dx * t;
      if (hx >= OX && hx <= OX + TABLE_W) {
        hitBottom = { x: hx, y: OY + TABLE_H, t: Math.abs(t) };
      }
    }
  }

  // 가장 가까운 교점 선택
  let extHit = null;
  if (hitRight && hitBottom) {
    extHit = hitRight.t <= hitBottom.t ? hitRight : hitBottom;
  } else {
    extHit = hitRight || hitBottom;
  }

  if (!extHit) return { val: null, hit: null };

  // 교점의 포인트 값 계산
  const val = projectOntoPolyline(extHit.x, extHit.y, cuePolyline);
  return { val, hit: extHit };
}

/**
 * 3쿠션 포인트 값 → 좌표 (하단 장쿠션)
 */
function c3ValueToPos(val) {
  val = Math.max(0, Math.min(50, val));
  for (let i = 0; i < c3Points.length - 1; i++) {
    if (val >= c3Points[i].val && val <= c3Points[i + 1].val) {
      const t = (val - c3Points[i].val) / (c3Points[i + 1].val - c3Points[i].val);
      return {
        x: c3Points[i].x + (c3Points[i + 1].x - c3Points[i].x) * t,
        y: c3Points[i].y + (c3Points[i + 1].y - c3Points[i].y) * t
      };
    }
  }
  const last = c3Points[c3Points.length - 1];
  return { x: last.x, y: last.y };
}

/**
 * 궤적 계산: 1쿠션 → 2쿠션(좌측) → 3쿠션(하단)
 *
 * Unfolding(전개) 기법으로 2쿠션 반사점을 계산:
 * 3쿠션 목표점을 좌측 벽 기준으로 반사시킨 가상점을 구하고,
 * 1쿠션 히트에서 가상점까지 직선을 그어 좌측 벽과의 교점 = 2쿠션
 */
function calcTrajectory(cueVal, c1Hit, c1Val) {
  if (c1Val === null || cueVal === null) return null;

  const c3Val = cueVal - c1Val;
  const outOfRange = c3Val < 0 || c3Val > 50;

  if (outOfRange) {
    return { c1: c1Hit, c2: null, c3: null, c3Val, outOfRange: true };
  }

  const c3Pos = c3ValueToPos(c3Val);

  // Unfolding: 3쿠션 목표를 좌측 벽(x=OX) 기준으로 반사
  const c3Reflected = { x: 2 * OX - c3Pos.x, y: c3Pos.y };

  // 1쿠션 히트 → 반사된 3쿠션 목표 직선이 좌측 벽과 만나는 점 = 2쿠션
  const dx = c3Reflected.x - c1Hit.x;
  const dy = c3Reflected.y - c1Hit.y;
  let c2 = null;

  if (Math.abs(dx) > 0.001) {
    const t = (OX - c1Hit.x) / dx;
    if (t > 0.001) {
      const hy = c1Hit.y + dy * t;
      if (hy >= OY && hy <= OY + TABLE_H) {
        c2 = { x: OX, y: hy, edge: 'left' };
      }
    }
  }

  // 좌측 벽에 못 닿는 경우 직선 경유
  if (!c2) {
    c2 = rayCushionHit(c1Hit.x, c1Hit.y, c3Pos.x - c1Hit.x, c3Pos.y - c1Hit.y, 'top');
  }

  return { c1: c1Hit, c2, c3: c3Pos, c3Val, outOfRange: false };
}

// ============================================================
//  시각화
// ============================================================

function drawAimLine(hit) {
  if (!hit) return;
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(hit.x, hit.y);
  ctx.strokeStyle = C_AIM;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
}

/** 연장선 (수구 뒤쪽으로 뻗는 파란 점선) */
function drawExtensionLine(extHit) {
  if (!extHit) return;
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(extHit.x, extHit.y);
  ctx.strokeStyle = C_EXT;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 교점 마커
  ctx.beginPath();
  ctx.arc(extHit.x, extHit.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0, 180, 255, 0.5)';
  ctx.fill();
  ctx.strokeStyle = '#0af';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawTrajectory(traj) {
  if (!traj) return;

  // 수구 → 1쿠션 (빨간 실선)
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(traj.c1.x, traj.c1.y);
  ctx.strokeStyle = C_TRAJ1;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  hitMarker(traj.c1.x, traj.c1.y, C_TRAJ1);

  if (traj.outOfRange || !traj.c2 || !traj.c3) return;

  // 1쿠션 → 2쿠션 (주황 실선)
  ctx.beginPath();
  ctx.moveTo(traj.c1.x, traj.c1.y);
  ctx.lineTo(traj.c2.x, traj.c2.y);
  ctx.strokeStyle = C_TRAJ2;
  ctx.lineWidth = 2;
  ctx.stroke();
  hitMarker(traj.c2.x, traj.c2.y, C_TRAJ2);

  // 2쿠션 → 3쿠션 (빨간 점선)
  ctx.beginPath();
  ctx.moveTo(traj.c2.x, traj.c2.y);
  ctx.lineTo(traj.c3.x, traj.c3.y);
  ctx.strokeStyle = C_TRAJ3;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 3]);
  ctx.stroke();
  ctx.setLineDash([]);
  hitMarker(traj.c3.x, traj.c3.y, C_TRAJ3);
}

function hitMarker(x, y, color) {
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ============================================================
//  유틸리티
// ============================================================

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ============================================================
//  메인 렌더 루프
// ============================================================

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1) 당구대
  drawTable();

  // 2) 포인트 라벨
  drawPointSet(c1Points, '#ffcc44', 'above');                 // 1쿠션 (상단)
  drawPointSet(c3Points, '#ff8888', 'below');                 // 3쿠션 (하단)
  drawPointSet(cueRight, '#88ccff', 'right');                 // 수구 우측
  drawPointSet(cueBottom.slice(1), '#88ccff', 'below');       // 수구 하단 (50 제외, 중복 방지)

  // 3) 계산
  const c1Hit = calcFirstCushionHit(cueBall.x, cueBall.y, mousePos.x, mousePos.y);

  if (c1Hit && c1Hit.edge === 'top') {
    const c1Val = calcC1Value(c1Hit);

    // ★ 연장선 기반 수구 값 계산
    const ext = calcCueValueByExtension(cueBall.x, cueBall.y, c1Hit.x, c1Hit.y);
    const cueVal = ext.val;

    // 연장선 시각화
    drawExtensionLine(ext.hit);

    if (c1Val !== null && cueVal !== null) {
      const traj = calcTrajectory(cueVal, c1Hit, c1Val);
      drawTrajectory(traj);

      // UI
      document.getElementById('val-cue').textContent = cueVal.toFixed(1);
      document.getElementById('val-c1').textContent = c1Val.toFixed(1);
      const c3v = traj ? traj.c3Val.toFixed(1) : '-';
      const rangeNote = traj && traj.outOfRange ? ' ⚠️' : '';
      document.getElementById('val-c3').textContent = c3v + rangeNote;
      document.getElementById('val-formula').textContent =
        `${cueVal.toFixed(1)} − ${c1Val.toFixed(1)} = ${c3v}`;
    } else {
      drawAimLine(c1Hit);
      resetUI();
    }
  } else {
    drawAimLine(c1Hit);
    resetUI('상단 쿠션을 겨냥하세요');
  }

  // 4) 수구
  drawCueBall();

  requestAnimationFrame(render);
}

function resetUI(msg) {
  document.getElementById('val-cue').textContent = '-';
  document.getElementById('val-c1').textContent = '-';
  document.getElementById('val-c3').textContent = '-';
  document.getElementById('val-formula').textContent = msg || '수구 − 1쿠션 = 3쿠션';
}

// ============================================================
//  마우스 이벤트
// ============================================================

function getMousePos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (canvas.width / r.width),
    y: (e.clientY - r.top) * (canvas.height / r.height)
  };
}

canvas.addEventListener('mousedown', e => {
  const p = getMousePos(e);
  if (Math.hypot(p.x - cueBall.x, p.y - cueBall.y) <= BALL_R + 8) {
    isDragging = true;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const p = getMousePos(e);
  if (isDragging) {
    cueBall.x = clamp(p.x, OX + BALL_R, OX + TABLE_W - BALL_R);
    cueBall.y = clamp(p.y, OY + BALL_R, OY + TABLE_H - BALL_R);
  }
  if (!aimLocked) mousePos = p;
  if (!isDragging) {
    canvas.style.cursor =
      Math.hypot(p.x - cueBall.x, p.y - cueBall.y) <= BALL_R + 8 ? 'grab' : 'crosshair';
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('click', e => {
  const p = getMousePos(e);
  if (Math.hypot(p.x - cueBall.x, p.y - cueBall.y) > BALL_R + 8) {
    aimLocked = !aimLocked;
  }
});

canvas.addEventListener('mouseleave', () => { isDragging = false; });

// ============================================================
//  시작
// ============================================================
render();
</script>
</body>
</html>
