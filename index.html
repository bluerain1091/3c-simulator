<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3쿠션 당구 - 파이브 앤 하프 시스템 시뮬레이터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 {
    margin-bottom: 10px;
    font-size: 1.4rem;
    letter-spacing: 1px;
  }
  #info-panel {
    display: flex;
    gap: 30px;
    margin-bottom: 10px;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.08);
    padding: 8px 24px;
    border-radius: 8px;
  }
  #info-panel span { font-weight: bold; color: #ffd700; }
  canvas { border-radius: 6px; cursor: crosshair; }
  #help {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #999;
  }
</style>
</head>
<body>

<h1>3쿠션 파이브 앤 하프 시스템 시뮬레이터</h1>

<div id="info-panel">
  <div>수구 포인트: <span id="val-cue">-</span></div>
  <div>1쿠션 포인트: <span id="val-c1">-</span></div>
  <div>3쿠션 포인트: <span id="val-c3">-</span></div>
  <div>공식: <span id="val-formula">수구 - 1쿠션 = 3쿠션</span></div>
</div>

<canvas id="table"></canvas>

<div id="help">
  드래그로 수구 이동 · 마우스를 움직여 겨냥 방향 설정 · 클릭하면 겨냥점 고정/해제
</div>

<script>
// ============================================================
//  파이브 앤 하프 시스템 (Five and a Half System)
//
//  당구대 배치도 (위에서 내려다 본 모습):
//
//         ←── 1쿠션 (상단 단쿠션) ──→
//    TL 40───30───20───10───0 TR
//    │                         │  10  ← 수구 (우측 장쿠션)
//    │                         │  15     장쿠션: 다이아몬드당 5
//    │   2쿠션                 │  20
//    │   (좌측 장쿠션)         │  25
//    │                         │  30
//    │                         │  35
//    │                         │  40
//    │                         │  45
//    BL 0───10───20───30───40 BR  50  ← 수구 기준점 (코너=50)
//       ←── 3쿠션 (하단 단쿠션) ──→
//       ← 수구 연장: 60──70──80
//
//  공식: 수구 포인트 - 1쿠션 포인트 = 3쿠션 포인트
//  경로: 수구(우측) → 1쿠션(상단) → 2쿠션(좌측) → 3쿠션(하단)
// ============================================================

const canvas = document.getElementById('table');
const ctx = canvas.getContext('2d');

// 당구대 내부 크기 (3쿠션 규격 2:1)
const TABLE_W = 800;
const TABLE_H = 400;
const CUSHION = 28;
const RAIL = 18;
const PADDING = 40;

canvas.width  = TABLE_W + (CUSHION + RAIL) * 2 + PADDING * 2;
canvas.height = TABLE_H + (CUSHION + RAIL) * 2 + PADDING * 2;

// 당구대 내부 좌상단 원점
const OX = PADDING + RAIL + CUSHION;
const OY = PADDING + RAIL + CUSHION;

// 코너 좌표 약칭
const TR_X = OX + TABLE_W, TR_Y = OY;             // 우상
const TL_X = OX,           TL_Y = OY;             // 좌상
const BR_X = OX + TABLE_W, BR_Y = OY + TABLE_H;   // 우하
const BL_X = OX,           BL_Y = OY + TABLE_H;   // 좌하

// 색상
const COLOR_RAIL    = '#5a3a1a';
const COLOR_CUSHION = '#2d8c3c';
const COLOR_FELT    = '#1b7a30';
const COLOR_LINE    = '#1a6b28';
const COLOR_TRAJ1   = '#ff4444';
const COLOR_TRAJ2   = '#ffaa00';
const COLOR_TRAJ3   = '#ff6666';
const COLOR_AIM     = 'rgba(255, 255, 80, 0.5)';

const BALL_R = 10;

// ============================================================
//  포인트 좌표 생성
// ============================================================

function buildPoints(x0, y0, x1, y1, values) {
  const pts = [];
  const n = values.length - 1;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push({
      x: x0 + (x1 - x0) * t,
      y: y0 + (y1 - y0) * t,
      val: values[i]
    });
  }
  return pts;
}

// --- 수구 포인트 ---
// 우측 장쿠션: BR(50) → TR(10), 다이아몬드당 5, 총 8다이아몬드
const cuePointsRight = buildPoints(
  BR_X, BR_Y,  // 우하 코너 = 50
  TR_X, TR_Y,  // 우상 코너 = 10
  [50, 45, 40, 35, 30, 25, 20, 15, 10]
);
// 하단 단쿠션 (수구 연장): BR(50) → BL 방향, 다이아몬드당 10
// 반 다이아몬드당 10 (50 이후 간격 좁아짐)
const cuePointsBottom = buildPoints(
  BR_X, BR_Y,  // 우하 = 50 (이미 포함됨)
  BL_X, BL_Y,  // 좌하 = 80
  [50, 60, 70, 80]
);

// 수구 전체 폴리라인: 하단(80→50) + 우측(50→10) — 값이 증가하는 순서로 통합
const cuePoints = [
  ...cuePointsBottom.slice().reverse(),  // 80→50 (BL→BR)
  ...cuePointsRight.slice(1)              // 45→10 (BR 위→TR)
];

// --- 1쿠션 포인트 ---
// 상단 단쿠션: TR(0) → TL(40), 다이아몬드당 10, 총 4다이아몬드
const firstCushionPoints = buildPoints(
  TR_X, TR_Y,  // 우상 = 0
  TL_X, TL_Y,  // 좌상 = 40
  [0, 10, 20, 30, 40]
);

// --- 3쿠션 포인트 ---
// 하단 단쿠션: BL(0) → BR(40), 다이아몬드당 10, 총 4다이아몬드
const thirdCushionPoints = buildPoints(
  BL_X, BL_Y,  // 좌하 = 0
  BR_X, BR_Y,  // 우하 = 40
  [0, 10, 20, 30, 40]
);

// ============================================================
//  수구 상태
// ============================================================

// 초기 위치: 수구 포인트 50 근처 (우하 코너)
let cueBall = { x: BR_X - 30, y: BR_Y - 60 };
let isDragging = false;
let aimLocked = false;
let mousePos = { x: 0, y: 0 };

// ============================================================
//  그리기 함수들
// ============================================================

function drawTable() {
  // 바깥 레일
  ctx.fillStyle = COLOR_RAIL;
  roundRect(ctx, PADDING, PADDING,
    TABLE_W + (CUSHION + RAIL) * 2,
    TABLE_H + (CUSHION + RAIL) * 2, 10);
  ctx.fill();

  // 쿠션
  ctx.fillStyle = COLOR_CUSHION;
  ctx.fillRect(PADDING + RAIL, PADDING + RAIL,
    TABLE_W + CUSHION * 2, TABLE_H + CUSHION * 2);

  // 필드
  ctx.fillStyle = COLOR_FELT;
  ctx.fillRect(OX, OY, TABLE_W, TABLE_H);

  // 중앙선 (세로)
  ctx.strokeStyle = COLOR_LINE;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(OX + TABLE_W / 2, OY);
  ctx.lineTo(OX + TABLE_W / 2, OY + TABLE_H);
  ctx.stroke();

  drawDiamonds();
}

function drawDiamonds() {
  const dSize = 3;
  ctx.fillStyle = '#f0e6c0';

  // 상단/하단 레일: 4다이아몬드 (단쿠션), 3개 내부 마커
  for (let i = 1; i < 4; i++) {
    const x = OX + (TABLE_W / 4) * i;
    drawDiamond(x, PADDING + RAIL / 2, dSize);
    drawDiamond(x, OY + TABLE_H + CUSHION + RAIL / 2, dSize);
  }
  // 좌측/우측 레일: 8다이아몬드 (장쿠션), 7개 내부 마커
  for (let i = 1; i < 8; i++) {
    const y = OY + (TABLE_H / 8) * i;
    drawDiamond(PADDING + RAIL / 2, y, dSize);
    drawDiamond(OX + TABLE_W + CUSHION + RAIL / 2, y, dSize);
  }
}

function drawDiamond(cx, cy, s) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.lineTo(cx + s, cy);
  ctx.lineTo(cx, cy + s);
  ctx.lineTo(cx - s, cy);
  ctx.closePath();
  ctx.fill();
}

function drawPointSet(points, color, labelSide) {
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const p of points) {
    // 점
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // 라벨
    let lx = p.x, ly = p.y;
    if (labelSide === 'above')  ly -= 13;
    if (labelSide === 'below')  ly += 13;
    if (labelSide === 'left')   lx -= 16;
    if (labelSide === 'right')  lx += 16;

    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fillText(p.val, lx, ly);
  }
}

function drawCueBall() {
  // 그림자
  ctx.beginPath();
  ctx.arc(cueBall.x + 2, cueBall.y + 2, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // 공 (그라데이션)
  const grad = ctx.createRadialGradient(
    cueBall.x - 3, cueBall.y - 3, 1,
    cueBall.x, cueBall.y, BALL_R
  );
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#cccccc');
  ctx.beginPath();
  ctx.arc(cueBall.x, cueBall.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ============================================================
//  파이브 앤 하프 공식 계산
// ============================================================

/**
 * 폴리라인 위로 점을 투영하여 보간된 포인트 값 반환
 */
function projectOntoPolyline(px, py, points) {
  let bestDist = Infinity;
  let bestVal = 0;

  for (let i = 0; i < points.length - 1; i++) {
    const ax = points[i].x, ay = points[i].y;
    const bx = points[i + 1].x, by = points[i + 1].y;
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    let t = lenSq === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    const dist = Math.hypot(px - cx, py - cy);
    if (dist < bestDist) {
      bestDist = dist;
      bestVal = points[i].val + t * (points[i + 1].val - points[i].val);
    }
  }
  return bestVal;
}

/**
 * 수구 위치 → 수구 포인트 값 (보간)
 */
function calcCuePointValue(bx, by) {
  // 우측 장쿠션 + 하단 단쿠션의 폴리라인에 투영
  // 장쿠션에 더 가까우면 장쿠션 기준, 하단에 더 가까우면 하단 기준
  const distToRight  = Math.abs(bx - BR_X);
  const distToBottom = Math.abs(by - BR_Y);

  if (distToRight <= distToBottom) {
    // 우측 장쿠션 기준
    return projectOntoPolyline(bx, by, cuePointsRight);
  } else {
    // 하단 단쿠션 기준
    return projectOntoPolyline(bx, by, cuePointsBottom);
  }
}

/**
 * 수구에서 마우스 방향으로 쏘았을 때 첫 번째 쿠션(상단) 히트 지점
 * 파이브 앤 하프 시스템은 1쿠션 = 상단 단쿠션
 */
function calcFirstCushionHit(bx, by, mx, my) {
  const dx = mx - bx;
  const dy = my - by;
  if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return null;

  let bestT = Infinity;
  let bestHit = null;

  // 상단 (y = OY)
  if (dy < 0) {
    const t = (OY - by) / dy;
    const hx = bx + dx * t;
    if (t > 0 && hx >= OX && hx <= OX + TABLE_W && t < bestT) {
      bestT = t;
      bestHit = { x: hx, y: OY, edge: 'top' };
    }
  }
  // 하단 (y = OY + TABLE_H)
  if (dy > 0) {
    const t = (OY + TABLE_H - by) / dy;
    const hx = bx + dx * t;
    if (t > 0 && hx >= OX && hx <= OX + TABLE_W && t < bestT) {
      bestT = t;
      bestHit = { x: hx, y: OY + TABLE_H, edge: 'bottom' };
    }
  }
  // 좌측 (x = OX)
  if (dx < 0) {
    const t = (OX - bx) / dx;
    const hy = by + dy * t;
    if (t > 0 && hy >= OY && hy <= OY + TABLE_H && t < bestT) {
      bestT = t;
      bestHit = { x: OX, y: hy, edge: 'left' };
    }
  }
  // 우측 (x = OX + TABLE_W)
  if (dx > 0) {
    const t = (OX + TABLE_W - bx) / dx;
    const hy = by + dy * t;
    if (t > 0 && hy >= OY && hy <= OY + TABLE_H && t < bestT) {
      bestT = t;
      bestHit = { x: OX + TABLE_W, y: hy, edge: 'right' };
    }
  }

  return bestHit;
}

/**
 * 1쿠션 히트 좌표 → 1쿠션 포인트 값 (상단 단쿠션만 유효)
 */
function calcFirstCushionValue(hit) {
  if (!hit || hit.edge !== 'top') return null;
  return projectOntoPolyline(hit.x, hit.y, firstCushionPoints);
}

/**
 * 3쿠션 포인트 값 → 좌표 (하단 단쿠션)
 */
function thirdCushionValueToPos(val) {
  val = Math.max(0, Math.min(40, val));
  const pts = thirdCushionPoints;
  for (let i = 0; i < pts.length - 1; i++) {
    if (val >= pts[i].val && val <= pts[i + 1].val) {
      const t = (val - pts[i].val) / (pts[i + 1].val - pts[i].val);
      return {
        x: pts[i].x + (pts[i + 1].x - pts[i].x) * t,
        y: pts[i].y + (pts[i + 1].y - pts[i].y) * t
      };
    }
  }
  return { x: pts[pts.length - 1].x, y: pts[pts.length - 1].y };
}

/**
 * 직선이 테이블 경계와 만나는 첫 번째 점
 */
function findNextCushionHit(sx, sy, tx, ty, excludeEdge) {
  const dx = tx - sx;
  const dy = ty - sy;
  let bestT = Infinity;
  let bestHit = null;

  const edges = [
    { edge: 'top',    check: dy < 0, t: (OY - sy) / dy,               axis: 'x' },
    { edge: 'bottom', check: dy > 0, t: (OY + TABLE_H - sy) / dy,     axis: 'x' },
    { edge: 'left',   check: dx < 0, t: (OX - sx) / dx,               axis: 'y' },
    { edge: 'right',  check: dx > 0, t: (OX + TABLE_W - sx) / dx,     axis: 'y' },
  ];

  for (const e of edges) {
    if (!e.check || e.edge === excludeEdge) continue;
    const t = e.t;
    if (t <= 0.001 || t >= bestT) continue;
    const hx = sx + dx * t;
    const hy = sy + dy * t;
    if (e.axis === 'x' && hx >= OX && hx <= OX + TABLE_W) {
      bestT = t;
      bestHit = { x: hx, y: e.edge === 'top' ? OY : OY + TABLE_H, edge: e.edge };
    }
    if (e.axis === 'y' && hy >= OY && hy <= OY + TABLE_H) {
      bestT = t;
      bestHit = { x: e.edge === 'left' ? OX : OX + TABLE_W, y: hy, edge: e.edge };
    }
  }

  return bestHit;
}

/**
 * 파이브 앤 하프 궤적 계산
 * 경로: 수구 → 1쿠션(상단) → 2쿠션(좌측) → 3쿠션(하단)
 */
function calcTrajectory(cueVal, c1Hit, c1Val) {
  if (!c1Hit || c1Val === null) return null;

  // 공식: 수구 - 1쿠션 = 3쿠션
  const c3Val = cueVal - c1Val;
  if (c3Val < 0 || c3Val > 40) return { c1: c1Hit, c2: null, c3: null, c3Val: c3Val, outOfRange: true };

  const c3Pos = thirdCushionValueToPos(c3Val);

  // 2쿠션: 1쿠션(상단)에서 3쿠션(하단) 방향으로 갈 때 좌측 장쿠션에 닿는 점
  const c2Hit = findNextCushionHit(c1Hit.x, c1Hit.y, c3Pos.x, c3Pos.y, 'top');

  return {
    c1: c1Hit,
    c2: c2Hit,
    c3: c3Pos,
    c3Val: c3Val,
    outOfRange: false
  };
}

// ============================================================
//  궤적 & 겨냥선 그리기
// ============================================================

function drawAimLine(hit) {
  if (!hit) return;
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(hit.x, hit.y);
  ctx.strokeStyle = COLOR_AIM;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawTrajectory(traj) {
  if (!traj) return;

  // 수구 → 1쿠션
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(traj.c1.x, traj.c1.y);
  ctx.strokeStyle = COLOR_TRAJ1;
  ctx.lineWidth = 2;
  ctx.stroke();
  drawHitMarker(traj.c1.x, traj.c1.y, COLOR_TRAJ1);

  if (traj.outOfRange || !traj.c2 || !traj.c3) return;

  // 1쿠션 → 2쿠션
  ctx.beginPath();
  ctx.moveTo(traj.c1.x, traj.c1.y);
  ctx.lineTo(traj.c2.x, traj.c2.y);
  ctx.strokeStyle = COLOR_TRAJ2;
  ctx.lineWidth = 2;
  ctx.stroke();
  drawHitMarker(traj.c2.x, traj.c2.y, COLOR_TRAJ2);

  // 2쿠션 → 3쿠션
  ctx.beginPath();
  ctx.moveTo(traj.c2.x, traj.c2.y);
  ctx.lineTo(traj.c3.x, traj.c3.y);
  ctx.strokeStyle = COLOR_TRAJ3;
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);
  drawHitMarker(traj.c3.x, traj.c3.y, COLOR_TRAJ3);
}

function drawHitMarker(x, y, color) {
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ============================================================
//  유틸리티
// ============================================================

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ============================================================
//  렌더 루프
// ============================================================

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. 당구대
  drawTable();

  // 2. 포인트 표시
  // 수구 포인트 — 우측 장쿠션 (라벨: 오른쪽)
  drawPointSet(cuePointsRight, '#88ccff', 'right');
  // 수구 연장 — 하단 단쿠션 (라벨: 아래), 50은 이미 표시되므로 60부터
  drawPointSet(cuePointsBottom.slice(1), '#88ccff', 'below');

  // 1쿠션 포인트 — 상단 단쿠션 (라벨: 위)
  drawPointSet(firstCushionPoints, '#ffcc44', 'above');

  // 3쿠션 포인트 — 하단 단쿠션 (라벨: 아래)
  drawPointSet(thirdCushionPoints, '#ff8888', 'below');

  // 3. 계산 및 궤적
  const c1Hit = calcFirstCushionHit(cueBall.x, cueBall.y, mousePos.x, mousePos.y);

  if (c1Hit && c1Hit.edge === 'top') {
    const cueVal = calcCuePointValue(cueBall.x, cueBall.y);
    const c1Val = calcFirstCushionValue(c1Hit);

    if (c1Val !== null) {
      const traj = calcTrajectory(cueVal, c1Hit, c1Val);
      drawTrajectory(traj);

      // UI
      document.getElementById('val-cue').textContent = cueVal.toFixed(1);
      document.getElementById('val-c1').textContent = c1Val.toFixed(1);
      const c3ValDisplay = traj ? traj.c3Val.toFixed(1) : '-';
      document.getElementById('val-c3').textContent = c3ValDisplay + (traj && traj.outOfRange ? ' (범위 초과)' : '');
      document.getElementById('val-formula').textContent =
        `${cueVal.toFixed(1)} - ${c1Val.toFixed(1)} = ${c3ValDisplay}`;
    } else {
      drawAimLine(c1Hit);
    }
  } else {
    drawAimLine(c1Hit);
    document.getElementById('val-cue').textContent = '-';
    document.getElementById('val-c1').textContent = '-';
    document.getElementById('val-c3').textContent = '-';
    document.getElementById('val-formula').textContent = '상단 쿠션을 겨냥하세요';
  }

  // 4. 수구
  drawCueBall();

  requestAnimationFrame(render);
}

// ============================================================
//  마우스 이벤트
// ============================================================

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('mousedown', (e) => {
  const pos = getMousePos(e);
  if (Math.hypot(pos.x - cueBall.x, pos.y - cueBall.y) <= BALL_R + 5) {
    isDragging = true;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getMousePos(e);
  if (isDragging) {
    cueBall.x = clamp(pos.x, OX + BALL_R, OX + TABLE_W - BALL_R);
    cueBall.y = clamp(pos.y, OY + BALL_R, OY + TABLE_H - BALL_R);
  }
  if (!aimLocked) mousePos = pos;
  if (!isDragging) {
    canvas.style.cursor = Math.hypot(pos.x - cueBall.x, pos.y - cueBall.y) <= BALL_R + 5 ? 'grab' : 'crosshair';
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('click', (e) => {
  const pos = getMousePos(e);
  if (Math.hypot(pos.x - cueBall.x, pos.y - cueBall.y) > BALL_R + 5) {
    aimLocked = !aimLocked;
  }
});

canvas.addEventListener('mouseleave', () => { isDragging = false; });

// ============================================================
//  시작
// ============================================================
render();
</script>
</body>
</html>
