<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3C Simulator - 파이브 앤 하프 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI',sans-serif;color:#eee;min-height:100vh;justify-content:center}
h1{margin-bottom:4px;font-size:1.15rem;letter-spacing:1px}
#info{display:flex;gap:14px;margin-bottom:3px;font-size:.82rem;
  background:rgba(255,255,255,.08);padding:5px 12px;border-radius:8px;flex-wrap:wrap}
#info span{font-weight:bold;color:#ffd700}
#ctrl{display:flex;align-items:center;gap:6px;margin-bottom:4px;
  background:rgba(255,255,255,.06);padding:4px 10px;border-radius:8px;font-size:.78rem;flex-wrap:wrap}
#ctrl label{color:#aaa}
.sep{width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 3px}
#pw{width:65px;accent-color:#d4a017}
#pv{min-width:22px;text-align:center;color:#ffd700;font-weight:bold}
#dir{font-weight:bold;padding:2px 6px;border-radius:4px;min-width:40px;text-align:center;font-size:.8rem}
.btn{padding:3px 12px;border:2px solid #d4a017;background:transparent;
  color:#d4a017;border-radius:5px;font-weight:bold;font-size:.8rem;cursor:pointer;transition:.2s}
.btn:hover{background:#d4a017;color:#1a1a2e}
.btn.act{background:#c0392b;border-color:#c0392b;color:#fff}
#sqt{accent-color:#d4a017}
#stats{font-size:.74rem;color:#aaa}
/* 당점 선택기 */
#tip-wrap{display:flex;align-items:center;gap:8px}
#tip-cv{border-radius:50%;cursor:crosshair;border:1px solid rgba(255,255,255,.2)}
#tip-info{font-size:.74rem;line-height:1.5;min-width:90px}
#tip-info b{color:#ffd700}
#miscue-warn{color:#ff4444;font-weight:bold;font-size:.72rem;display:none}
canvas#cv{border-radius:6px;cursor:crosshair}
#help{margin-top:3px;font-size:.68rem;color:#555}
.leg{display:flex;gap:10px;margin-top:2px;font-size:.7rem;color:#777}
.leg i{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px;vertical-align:middle}
</style>
</head>
<body>
<h1>3C Simulator - 파이브 앤 하프 시스템</h1>
<div id="info">
  <div>수구: <span id="vc">-</span></div>
  <div>1쿠션: <span id="v1">-</span></div>
  <div>3쿠션: <span id="v3">-</span></div>
  <div>공식: <span id="vf">수구 − 1쿠션 = 3쿠션</span></div>
  <div id="dir">-</div>
</div>
<div id="ctrl">
  <div id="tip-wrap">
    <canvas id="tip-cv" width="90" height="90"></canvas>
    <div id="tip-info">
      좌우(X): <b id="tx-val">+3.0</b><br>
      상하(Y): <b id="ty-val">0.0</b><br>
      <span id="tip-type" style="color:#d4a017">정회전</span><br>
      <span id="miscue-warn">미스큐 위험!</span>
    </div>
  </div>
  <div class="sep"></div>
  <label>파워:</label>
  <input type="range" id="pw" min="1" max="14" value="2.5" step=".5">
  <span id="pv">2.5</span>
  <div class="sep"></div>
  <input type="checkbox" id="sqt"><label for="sqt">스쿼트</label>
  <div class="sep"></div>
  <button class="btn" id="shoot">발사 [Space]</button>
  <span id="stats"></span>
</div>
<canvas id="cv"></canvas>
<div id="help">드래그:이동 · 마우스:겨냥 · 클릭:고정 · Space:발사 · 화살표:당점0.5 · WASD:당점1.0 · R:리셋 · P:물리예측</div>
<div class="leg">
  <span><i style="background:#88ccff"></i>수구</span>
  <span><i style="background:#ffcc44"></i>1쿠션</span>
  <span><i style="background:#ff8888"></i>3쿠션</span>
  <span><i style="background:#ff4444"></i>5½예측</span>
  <span><i style="background:#0f0"></i>물리예측</span>
  <span><i style="background:rgba(0,180,255,.7)"></i>연장선</span>
</div>

<script>
// ============================================================
//  3C Simulator v4 — 3D 회전 물리 + 상하좌우 당점
//
//  당점: tipX (좌우 English), tipY (상하 Follow/Draw)
//   tipX > 0: 정회전(Running), tipX < 0: 역회전(Reverse)
//   tipY > 0: 밀어치기(Follow/Top), tipY < 0: 끌어치기(Draw/Back)
//
//  미스큐: sqrt(tipX² + tipY²) > 4.0 → 타격 불가
//
//  물리: spinX(좌우), spinY(전후진)
//   spinY > 자연회전속도: 마찰이 공을 가속 (Follow)
//   spinY < 0: 마찰이 공을 감속/역전 (Draw)
// ============================================================

const cv = document.getElementById('cv');
const X = cv.getContext('2d');
const tcv = document.getElementById('tip-cv');
const TX = tcv.getContext('2d');

// --- 테이블 ---
const TW=800,TH=400,CU=28,RL=18,PD=40;
cv.width=TW+(CU+RL)*2+PD*2;
cv.height=TH+(CU+RL)*2+PD*2;
const OX=PD+RL+CU,OY=PD+RL+CU;
const TR={x:OX+TW,y:OY},TL={x:OX,y:OY};
const BR={x:OX+TW,y:OY+TH},BL={x:OX,y:OY+TH};
const R=10;

// --- 물리 상수 (SLDT 데이터 역산) ---
// 기준 샷: 0→17, c1=17.4
// 정회전: c2=11.0, c3=6.0 | 무회전: c2=10.3, c3=6.7 | 역회전: c2=10.6, c3=5.0
const P = {
  mu_felt:      0.0023,   // 바닥 마찰 — rest=0.80 + 파워14=9쿠션
  mu_cushion:   0.143,    // 쿠션 마찰 (스핀→접선)
  restitution:  0.80,     // 쿠션 반발 (낮춰서 적정 정지)
  spinX_decay:  0.16,     // 사이드스핀 감쇠
  spinY_decay:  0.16,     // 전후진 스핀 감쇠
  spinY_accel:  0.30,     // spinY → Follow/Draw (커플링 강도)
  spinX_curve:  0.00005,  // spinX → 커브
  squirt:       0.005,    // 스쿼트
  reverse_grip1:0.025,    // 리버스 그립 — 첫 쿠션
  reverse_grip2:0.958,    // 리버스 그립 — 이후 쿠션
  min_spd:      0.3,     // 정지 판정 (높여서 빠르게 멈춤)
};

// --- 당점 ---
let tipX = -2.0;  // -4 ~ +4 (좌우) — 기본 10:30 = 왼쪽 상단
let tipY = 2.0;   // -4 ~ +4 (상하) — 기본 10:30 = 상단
const MISCUE_R = 4.0;
const STD_RUNNING = 2, TIP_ADJ = 2.5; // 시스템 기준: 러닝 2팁 (10:30 방향)

// --- 상태 ---
let power=2.5, sqtOn=false, showPP=true;
const S={AIM:0,SIM:1};
let st=S.AIM;

// 3구 공 (수구=흰색, 1적구=노랑, 2적구=빨강)
// 기본 배치: 뒤돌려치기 — 수구(12.5,20) 1적구(12.5,16) 2적구(22,23)
// 포인트→좌표: 상단14~22→x, 좌측9~13→y
function pt2x(topPt){return OX+((topPt-14)/8)*TW;}
function pt2y(leftPt){return OY+TH-((leftPt-9)/4)*TH;}
const initBalls=[
  {x:pt2x(20),   y:pt2y(12.5), col1:'#fff',col2:'#ccc',name:'수구'},
  {x:pt2x(16),   y:pt2y(12.5), col1:'#ffe040',col2:'#cc9900',name:'1적구'},
  {x:OX+TW-25,   y:OY+25,      col1:'#ff4444',col2:'#aa0000',name:'2적구'},
];
const balls=initBalls.map(b=>({...b,vx:0,vy:0,sx:0,sy:0,bn:0}));
const ball=balls[0]; // 수구 참조
let ghost={x:ball.x,y:ball.y};
let trail=[],bounces=0,predTraj=null,ppPath=null;
let dragBall=null,aimLk=false,mouse={x:0,y:0},curDir='left';

// ============================================================
//  당점 선택기 UI (작은 캔버스)
// ============================================================

function isMiscue(){ return Math.hypot(tipX, tipY) > MISCUE_R; }

function drawTipSelector(){
  const w=90,h=90,cx=w/2,cy=h/2,r=38;
  TX.clearRect(0,0,w,h);

  // 배경
  TX.beginPath();TX.arc(cx,cy,r,0,Math.PI*2);
  TX.fillStyle='rgba(255,255,255,.08)';TX.fill();
  TX.strokeStyle='rgba(255,255,255,.2)';TX.lineWidth=1;TX.stroke();

  // 미스큐 한계원
  const mr = r * (MISCUE_R / 4);
  TX.beginPath();TX.arc(cx,cy,mr,0,Math.PI*2);
  TX.strokeStyle='rgba(255,80,80,.3)';TX.lineWidth=1;TX.setLineDash([3,3]);TX.stroke();TX.setLineDash([]);

  // 십자선
  TX.strokeStyle='rgba(255,255,255,.1)';TX.lineWidth=.5;
  TX.beginPath();TX.moveTo(cx-r,cy);TX.lineTo(cx+r,cy);TX.stroke();
  TX.beginPath();TX.moveTo(cx,cy-r);TX.lineTo(cx,cy+r);TX.stroke();

  // 그리드 (0.5팁 간격 — 가이드 점)
  TX.fillStyle='rgba(255,255,255,.06)';
  for(let ix=-4;ix<=4;ix+=0.5){
    for(let iy=-4;iy<=4;iy+=0.5){
      if(Math.hypot(ix,iy)>4.2)continue;
      const px=cx+(ix/4)*r, py=cy+(iy/4)*r;
      TX.beginPath();TX.arc(px,py,.8,0,Math.PI*2);TX.fill();
    }
  }

  // 당점 위치
  const tx = cx + (tipX/4)*r;
  const ty = cy + (-tipY/4)*r; // Y 반전 (위=양수)
  const miscue = isMiscue();

  TX.beginPath();TX.arc(tx,ty,5,0,Math.PI*2);
  if(miscue) TX.fillStyle='#ff2222';
  else if(tipX>0) TX.fillStyle='#d4a017';
  else if(tipX<0) TX.fillStyle='#c0392b';
  else TX.fillStyle='#888';
  TX.fill();TX.strokeStyle='#fff';TX.lineWidth=1;TX.stroke();

  // 라벨
  TX.font='bold 8px sans-serif';TX.textAlign='center';TX.fillStyle='rgba(255,255,255,.4)';
  TX.fillText('밀어',cx,cy-r-3);
  TX.fillText('끌어',cx,cy+r+8);
  TX.fillText('좌',cx-r-2,cy+3);
  TX.fillText('우',cx+r+2,cy+3);
}

function updateTipUI(){
  document.getElementById('tx-val').textContent = (tipX>0?'+':'')+tipX.toFixed(1);
  document.getElementById('ty-val').textContent = (tipY>0?'+':'')+tipY.toFixed(1);

  const miscue = isMiscue();
  document.getElementById('miscue-warn').style.display = miscue?'block':'none';

  let type='';
  if(miscue) type='미스큐!';
  // 정/역회전 판단: 진행방향 기준 (좌향→tipX<0이 정회전, 우향→tipX>0이 정회전)
  const isRun=(curDir==='left')?(tipX<0):(tipX>0);
  const eng=tipX===0?'':(isRun?'정회전':'역회전');
  if(tipY>1) type=eng?'밀어+'+eng:'밀어';
  else if(tipY<-1) type=eng?'끌어+'+eng:'끌어';
  else if(tipX!==0) type=eng;
  else type='무회전';

  const el=document.getElementById('tip-type');
  el.textContent=type;
  const runCol=(curDir==='left')?(tipX<0):(tipX>0);
  el.style.color=miscue?'#f44':tipX===0?'#aaa':runCol?'#d4a017':'#c0392b';

  drawTipSelector();
}

// 당점 캔버스 클릭
tcv.addEventListener('click',e=>{
  const rect=tcv.getBoundingClientRect();
  const mx=(e.clientX-rect.left), my=(e.clientY-rect.top);
  const cx=45,cy=45,r=38;
  const nx=(mx-cx)/r*4, ny=-(my-cy)/r*4; // Y 반전
  tipX=Math.round(nx*2)/2; // 0.5 단위 스냅
  tipY=Math.round(ny*2)/2;
  tipX=Math.max(-4,Math.min(4,tipX));
  tipY=Math.max(-4,Math.min(4,tipY));
  updateTipUI();
});

updateTipUI();

// ============================================================
//  포인트 시스템 (양방향)
// ============================================================

function bP(a,b,v){const p=[],n=v.length-1;for(let i=0;i<=n;i++){const t=i/n;p.push({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t,val:v[i]});}return p;}
const SL={c1:bP(TR,TL,[0,10,20,30,40,50]),c3:bP(BL,BR,[0,10,20,30,40,50]),
  cs:bP(BR,TR,[50,60,70,80,90]),cl:bP(BR,BL,[50,45,40,35,30,25,20,15,10]),
  w2:'left',w2x:OX,ss:'right',lbl:'← 좌'};
const SR={c1:bP(TL,TR,[0,10,20,30,40,50]),c3:bP(BR,BL,[0,10,20,30,40,50]),
  cs:bP(BL,TL,[50,60,70,80,90]),cl:bP(BL,BR,[50,45,40,35,30,25,20,15,10]),
  w2:'right',w2x:OX+TW,ss:'left',lbl:'우 →'};
function mkP(s){return[...s.cl.slice().reverse(),...s.cs.slice(1)];}
SL.cp=mkP(SL);SR.cp=mkP(SR);

// ============================================================
//  투영 / 레이캐스트
// ============================================================

function proj(px,py,pts){
  let b=1e9,v=0;
  for(let i=0;i<pts.length-1;i++){
    const ax=pts[i].x,ay=pts[i].y,bx=pts[i+1].x,by=pts[i+1].y;
    const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
    let t=l2===0?0:((px-ax)*dx+(py-ay)*dy)/l2;
    t=Math.max(0,Math.min(1,t));
    const d=Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
    if(d<b){b=d;v=pts[i].val+t*(pts[i+1].val-pts[i].val);}
  }return v;
}

function rayH(sx,sy,dx,dy,ex){
  let bt=1e9,h=null;
  const ts=[{n:'top',ok:dy<0,t:(OY-sy)/dy},{n:'bottom',ok:dy>0,t:(OY+TH-sy)/dy},
    {n:'left',ok:dx<0,t:(OX-sx)/dx},{n:'right',ok:dx>0,t:(OX+TW-sx)/dx}];
  for(const e of ts){if(!e.ok||e.n===ex||e.t<.001||e.t>=bt)continue;
    const hx=sx+dx*e.t,hy=sy+dy*e.t;
    if((e.n==='top'||e.n==='bottom')&&hx>=OX-.5&&hx<=OX+TW+.5){bt=e.t;h={x:hx,y:e.n==='top'?OY:OY+TH,edge:e.n};}
    if((e.n==='left'||e.n==='right')&&hy>=OY-.5&&hy<=OY+TH+.5){bt=e.t;h={x:e.n==='left'?OX:OX+TW,y:hy,edge:e.n};}
  }return h;
}

// ============================================================
//  파이브 앤 하프 시스템
// ============================================================

function detectDir(c1){if(!c1)return curDir;return c1.x<ball.x?'left':'right';}
function calcC1(bx,by,mx,my){const dx=mx-bx,dy=my-by;if(Math.abs(dx)<.5&&Math.abs(dy)<.5)return null;return rayH(bx,by,dx,dy,null);}
function calcC1Val(h,s){return(!h||h.edge!=='top')?null:proj(h.x,h.y,s.c1);}

function calcExt(bx,by,c1x,c1y,s){
  const dx=bx-c1x,dy=by-c1y;
  const wX=s.ss==='right'?OX+TW:OX;
  const nd=s.ss==='right'?(dx>.001):(dx<-.001);
  let hS=null,hB=null;
  if(nd){const t=(wX-bx)/dx;if(t>-.001){const hy=by+dy*t;if(hy>=OY&&hy<=OY+TH)hS={x:wX,y:hy,t:Math.abs(t)};}}
  if(dy>.001){const t=(OY+TH-by)/dy;if(t>-.001){const hx=bx+dx*t;if(hx>=OX&&hx<=OX+TW)hB={x:hx,y:OY+TH,t:Math.abs(t)};}}
  let e=null;if(hS&&hB)e=hS.t<=hB.t?hS:hB;else e=hS||hB;
  if(!e)return{val:null,hit:null};
  return{val:proj(e.x,e.y,s.cp),hit:e};
}

function c3P(v,s){v=Math.max(0,Math.min(50,v));const pts=s.c3;
  for(let i=0;i<pts.length-1;i++){if(v>=pts[i].val&&v<=pts[i+1].val){const t=(v-pts[i].val)/(pts[i+1].val-pts[i].val);
    return{x:pts[i].x+(pts[i+1].x-pts[i].x)*t,y:pts[i].y+(pts[i+1].y-pts[i].y)*t};}}
  return{x:pts[pts.length-1].x,y:pts[pts.length-1].y};}

function calcTraj(cv_,c1h,c1v,s){
  if(c1v===null||cv_===null)return null;
  // 방향 인식 러닝량: 좌향이면 -tipX가 러닝, 우향이면 tipX가 러닝
  const running=(s===SL)?-tipX:tipX;
  const adj=(running-STD_RUNNING)*TIP_ADJ;
  const c3v=(cv_-c1v)+adj;
  if(c3v<0||c3v>50)return{c1:c1h,c2:null,c3:null,c3v,oor:true};
  const c3p=c3P(c3v,s);
  const ref={x:2*s.w2x-c3p.x,y:c3p.y};
  const rdx=ref.x-c1h.x,rdy=ref.y-c1h.y;
  let c2=null;
  if(Math.abs(rdx)>.001){const t=(s.w2x-c1h.x)/rdx;if(t>.001){const hy=c1h.y+rdy*t;if(hy>=OY&&hy<=OY+TH)c2={x:s.w2x,y:hy,edge:s.w2};}}
  if(!c2)c2=rayH(c1h.x,c1h.y,c3p.x-c1h.x,c3p.y-c1h.y,'top');
  return{c1:c1h,c2,c3:c3p,c3v,oor:false};
}

// ============================================================
//  물리 엔진 — 3D 회전
// ============================================================

/**
 * 쿠션 충돌 — 단순화된 정확한 모델
 *
 * 1. 법선: 반발계수로 반사 (접선 손실 없음)
 * 2. spinX: 쿠션 마찰을 통해 접선 방향 힘 추가
 *    - Running: 접선 방향과 같음 → 궤적 확장 (×1.0)
 *    - Reverse: 접선 방향 반대 → 궤적 축소 (×1.8)
 * 3. spinY: 이 단계에서는 영향 없음 (바닥에서만 작용)
 */
function cushionBounce(b, edge){
  const hz=(edge==='top'||edge==='bottom');
  let vn=hz?b.vy:b.vx;
  let vt=hz?b.vx:b.vy;

  const impF=Math.abs(vn);

  // 법선 반사
  vn = -vn * P.restitution;

  // spinX → 접선 (쿠션 고무 마찰)
  const sxSign=(edge==='top'||edge==='right')?-1:1;
  const spinForce = P.mu_cushion * b.sx * impF * sxSign;
  const isReverse = (spinForce * vt < 0);
  const grip = isReverse ? (b.bn===0 ? P.reverse_grip1 : P.reverse_grip2) : 1.0;
  vt += spinForce * grip;
  b.bn = (b.bn||0) + 1;

  // ★ 쿠션 마찰에 의한 자연 회전 발생
  // 무회전 공이라도 쿠션에 닿으면 접선 슬라이딩으로 spinX가 생김
  // 접선 속도 방향과 반대로 회전 발생 (쿠션 고무가 공을 잡음)
  const naturalSpin = -vt * 0.015 * sxSign;
  b.sx += naturalSpin;

  // 스핀 감쇠
  b.sx *= (1 - P.spinX_decay);
  b.sy *= (1 - P.spinY_decay);

  if(hz){b.vy=vn;b.vx=vt;}else{b.vx=vn;b.vy=vt;}
}

/**
 * 물리 스텝 — spinY(전후진) 통합
 *
 * 자연 회전속도: ω_natural = v / R
 * spinY > ω_natural → 마찰이 공을 가속 (Follow)
 * spinY < 0 → 마찰이 공을 감속/역전 (Draw)
 * spinY는 점진적으로 자연 회전속도에 수렴
 */
function physicsStep(b){
  const spd=Math.hypot(b.vx,b.vy);
  if(spd<P.min_spd&&Math.abs(b.sy)<0.5)return false;

  // 바닥 마찰
  const f=1-P.mu_felt;
  b.vx*=f; b.vy*=f;

  // 슬립 기반 팔로우/드로우 (실제 물리 단순화)
  // sy > 0: 팔로우 (속도보다 회전이 빠름 → 마찰이 전진 방향으로)
  // sy < 0: 드로우 (역회전 → 마찰이 역방향으로)
  if(Math.abs(b.sy) > 0.1 && spd > 0.05) {
    // 자연 롤링에서의 ω
    const natSpin = spd * 15;  // 스케일된 자연회전
    const diff = b.sy - natSpin;

    if(Math.abs(diff) > 0.5) {
      // 슬라이딩: 마찰이 속도↔회전을 동시에 자연 롤링으로 수렴
      const coupling = 0.025;
      const velDelta = diff * coupling;
      // 속도 변화 캡: 한 프레임에 최대 0.5px/frame 변화 (폭주 방지)
      const maxDelta = 0.5;
      const clamped = Math.max(-maxDelta, Math.min(maxDelta, velDelta));
      b.vx += (b.vx / Math.max(spd, 0.1)) * clamped;
      b.vy += (b.vy / Math.max(spd, 0.1)) * clamped;
      // 회전도 반대로 수렴
      b.sy -= diff * 0.02;
    }
  }

  // 이동
  b.x+=b.vx; b.y+=b.vy;

  // 쿠션 충돌
  let bounced=false;
  if(b.y-R<=OY){b.y=OY+R;cushionBounce(b,'top');bounced=true;}
  if(b.y+R>=OY+TH){b.y=OY+TH-R;cushionBounce(b,'bottom');bounced=true;}
  if(b.x-R<=OX){b.x=OX+R;cushionBounce(b,'left');bounced=true;}
  if(b.x+R>=OX+TW){b.x=OX+TW-R;cushionBounce(b,'right');bounced=true;}

  return bounced;
}

/** 공끼리 탄성 충돌 (같은 질량) */
function ballCollision(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  const dist=Math.hypot(dx,dy);
  if(dist>=R*2||dist<0.01)return false;

  // 겹침 해소 (충분히 밀어냄)
  const nx=dx/dist, ny=dy/dist;
  const overlap=R*2-dist+0.5; // 여유분 추가
  a.x-=nx*overlap/2; a.y-=ny*overlap/2;
  b.x+=nx*overlap/2; b.y+=ny*overlap/2;

  // 상대 속도
  const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
  const dvn=dvx*nx+dvy*ny;
  if(dvn<=0)return false;

  // 같은 질량 탄성 충돌: 법선 성분 교환
  a.vx-=dvn*nx; a.vy-=dvn*ny;
  b.vx+=dvn*nx; b.vy+=dvn*ny;

  // 스핀 전달
  const spinTransfer = 0.08;
  b.sx += -a.sx * spinTransfer;
  b.sy += -a.sy * spinTransfer;

  // 수구 스핀도 충돌로 감소
  const aSpdAfter=Math.hypot(a.vx,a.vy);
  const aSpdBefore=Math.hypot(a.vx+dvn*nx, a.vy+dvn*ny);
  if(aSpdBefore>0.1){
    const ratio=aSpdAfter/aSpdBefore;
    a.sx*=ratio; a.sy*=ratio;
  }
  return true;
}

/** 이동 전 연속 충돌 감지 (CCD) — 터널링 방지 */
function checkBallCCD(a,b){
  // a가 이동할 때 b를 관통하는지 미리 체크
  // a의 이동 벡터와 b 중심 사이 최근접 거리 계산
  const dx=b.x-a.x, dy=b.y-a.y;
  const dist=Math.hypot(dx,dy);
  if(dist<R*2) return true; // 이미 겹침
  if(Math.hypot(a.vx,a.vy)<0.01) return false;

  // a의 이동 벡터
  const mvx=a.vx, mvy=a.vy;
  const mvLen=Math.hypot(mvx,mvy);
  if(mvLen<0.1) return false;

  // a→b 벡터를 이동 방향에 투영
  const t=(dx*mvx+dy*mvy)/(mvLen*mvLen);
  if(t<0||t>1) return false; // 이동 범위 밖

  // 최근접점에서의 거리
  const cx=a.x+mvx*t, cy=a.y+mvy*t;
  const closeDist=Math.hypot(b.x-cx,b.y-cy);
  if(closeDist<R*2){
    // 충돌 지점으로 a를 이동시키고 충돌 처리
    const penetrate=R*2-closeDist;
    const backT=Math.max(0,t-penetrate/(mvLen+0.1));
    a.x=a.x+mvx*backT-mvx; // 이동 취소 후 충돌 직전으로
    a.y=a.y+mvy*backT-mvy;
    return true;
  }
  return false;
}

/** 모든 공 물리 스텝 */
function stepAllBalls(){
  // 각 공 이동
  for(const b of balls){
    if(Math.hypot(b.vx,b.vy)>=0.05||Math.abs(b.sy)>0.1||Math.abs(b.sx)>0.1) physicsStep(b);
  }
  // 공끼리 충돌 — 여러 번 체크 (겹침 완전 해소)
  for(let pass=0;pass<3;pass++){
    for(let i=0;i<balls.length;i++)
      for(let j=i+1;j<balls.length;j++)
        ballCollision(balls[i],balls[j]);
  }
}

/** 모든 공 정지 확인 */
function allStopped(){
  return balls.every(b=>Math.hypot(b.vx,b.vy)<P.min_spd);
}

/** 물리 예측 경로 */
function calcPP(sx,sy,vx,vy,spinX,spinY){
  const g={x:sx,y:sy,vx,vy,sx:spinX,sy:spinY};
  const path=[{x:g.x,y:g.y}];let bc=0;
  for(let i=0;i<4000;i++){
    const spd=Math.hypot(g.vx,g.vy);
    if(spd<P.min_spd&&Math.abs(g.sy)<0.5)break;
    g.vx*=(1-P.mu_felt);g.vy*=(1-P.mu_felt);
    if(Math.abs(g.sy)>0.1&&spd>0.05){
      const ns=spd*15,d=g.sy-ns;
      if(Math.abs(d)>0.5){
        const cd=Math.max(-0.5,Math.min(0.5,d*0.025));
        g.vx+=(g.vx/Math.max(spd,0.1))*cd;
        g.vy+=(g.vy/Math.max(spd,0.1))*cd;
        g.sy-=d*0.02;
      }
    }
    g.x+=g.vx;g.y+=g.vy;
    let bo=false;
    if(g.y-R<=OY){g.y=OY+R;cushionBounce(g,'top');bo=true;}
    if(g.y+R>=OY+TH){g.y=OY+TH-R;cushionBounce(g,'bottom');bo=true;}
    if(g.x-R<=OX){g.x=OX+R;cushionBounce(g,'left');bo=true;}
    if(g.x+R>=OX+TW){g.x=OX+TW-R;cushionBounce(g,'right');bo=true;}
    if(bo){bc++;path.push({x:g.x,y:g.y});}
    if(bc>=4)break;
  }
  path.push({x:g.x,y:g.y});return path;
}

// ============================================================
//  발사 / 정지 / 리셋
// ============================================================

function startSim(){
  if(isMiscue()){
    document.getElementById('miscue-warn').style.display='block';
    setTimeout(()=>document.getElementById('miscue-warn').style.display='none',2000);
    return;
  }

  const c1h=calcC1(ball.x,ball.y,mouse.x,mouse.y);
  if(!c1h)return;

  const dir=detectDir(c1h);curDir=dir;
  const sys=dir==='left'?SL:SR;

  // 5&half 예측 저장 (상단 쿠션일 때만 시스템 공식 적용)
  predTraj=null;
  if(c1h.edge==='top'){
    const c1v=calcC1Val(c1h,sys);
    const ext=calcExt(ball.x,ball.y,c1h.x,c1h.y,sys);
    if(c1v!==null&&ext.val!==null)predTraj=calcTraj(ext.val,c1h,c1v,sys);
  }

  // 발사 벡터
  let dx=c1h.x-ball.x,dy=c1h.y-ball.y;
  const len=Math.hypot(dx,dy);
  let ndx=dx/len,ndy=dy/len;

  // 스쿼트 (tipX에 의한 편향)
  if(sqtOn&&tipX!==0){
    const sq=-tipX*P.squirt*(power/7);
    const cs=Math.cos(sq),sn=Math.sin(sq);
    const nx=ndx*cs-ndy*sn,ny=ndx*sn+ndy*cs;ndx=nx;ndy=ny;
  }

  ball.vx=ndx*power; ball.vy=ndy*power;

  // 스핀 부여: tipX > 0 = 오른쪽 치기 = 오른쪽 스핀
  ball.sx = -tipX;               // 큐 오프셋 → 스핀 반전 (왼쪽 치면 시계방향)
  ball.sy = tipY * power * 20; // 상하 전후진 스핀 (natSpin=spd*15 기준)
  ball.bn = 0;                    // 쿠션 카운터 (grip 분리용)

  ghost={x:ball.x,y:ball.y};
  trail=[];bounces=0;st=S.SIM;aimLk=false;
  document.getElementById('shoot').textContent='정지 [Space]';
  document.getElementById('shoot').classList.add('act');
}

function stopSim(){
  st=S.AIM;
  for(const b of balls){b.vx=0;b.vy=0;b.sx=0;b.sy=0;b.bn=0;}
  document.getElementById('shoot').textContent='발사 [Space]';
  document.getElementById('shoot').classList.remove('act');
}

function resetBall(){
  stopSim();
  for(let i=0;i<3;i++){balls[i].x=initBalls[i].x;balls[i].y=initBalls[i].y;}
  trail=[];predTraj=null;ppPath=null;bounces=0;
}

  }

  for(let i=0;i<=40;i++){

    X.beginPath();X.moveTo(OX,y);X.lineTo(OX+h,y);X.stroke();          // 좌측 안쪽
    X.beginPath();X.moveTo(OX+TW,y);X.lineTo(OX+TW-h,y);X.stroke();   // 우측 안쪽
  }
  // 레일 다이아몬드 마커 + 번호 (시계방향 0~23, 우하=0)
  X.fillStyle='#f0e6c0';
  const ryT=PD+RL/2, ryB=OY+TH+CU+RL/2, rxL=PD+RL/2, rxR=OX+TW+CU+RL/2;

  X.font='bold 9px sans-serif';X.textAlign='center';X.textBaseline='middle';

  // 28개 포인트 (각 레일 독립, 코너 중복 포함)
  const pts=[];
  // 하단 장축 우→좌: 0~8 (9개)
  for(let i=0;i<=8;i++) pts.push({x:OX+TW-i*(TW/8),y:ryB,lx:OX+TW-i*(TW/8),ly:oB});
  // 좌측 단축 하→상: 9~13 (5개)
  for(let i=0;i<=4;i++) pts.push({x:rxL,y:OY+TH-i*(TH/4),lx:oL,ly:OY+TH-i*(TH/4)});
  // 상단 장축 좌→우: 14~22 (9개)
  for(let i=0;i<=8;i++) pts.push({x:OX+i*(TW/8),y:ryT,lx:OX+i*(TW/8),ly:oT});
  // 우측 단축 상→하: 23~27 (5개)
  for(let i=0;i<=4;i++) pts.push({x:rxR,y:OY+i*(TH/4),lx:oR,ly:OY+i*(TH/4)});

  // 전부 그리기
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    X.fillStyle='#f0e6c0';dm(p.x,p.y);
    X.fillStyle='rgba(255,200,100,.8)';X.fillText(i,p.lx,p.ly);
  }
}
function dm(x,y){const s=3;X.beginPath();X.moveTo(x,y-s);X.lineTo(x+s,y);X.lineTo(x,y+s);X.lineTo(x-s,y);X.closePath();X.fill();}

function drawOneBall(b){
  X.beginPath();X.arc(b.x+2,b.y+2,R,0,Math.PI*2);X.fillStyle='rgba(0,0,0,.25)';X.fill();
  const g=X.createRadialGradient(b.x-3,b.y-3,1,b.x,b.y,R);
  g.addColorStop(0,b.col1);g.addColorStop(1,b.col2);
  X.beginPath();X.arc(b.x,b.y,R,0,Math.PI*2);X.fillStyle=g;X.fill();
  X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=.5;X.stroke();
}

// ============================================================
//  공 두께(Thickness) 시스템 — 8등분 + 1/3
// ============================================================

/**
 * 수구 궤적이 목적구에 닿는 두께 계산
 * 반환: {ball, ghostX, ghostY, thick, dist, targetDx, targetDy, cueDx, cueDy} 또는 null
 */
function calcThickness(bx,by,dx,dy){
  const len=Math.hypot(dx,dy);if(len<0.1)return null;
  const nx=dx/len, ny=dy/len;
  let best=null, bestT=Infinity;

  for(let i=1;i<=2;i++){
    const tb=balls[i];
    // 수구→마우스 방향 직선에서 목적구 중심까지 최근접 거리
    const cx=tb.x-bx, cy=tb.y-by;
    const t=cx*nx+cy*ny; // 투영 거리
    if(t<R)continue; // 뒤에 있음
    const perpX=bx+nx*t-tb.x, perpY=by+ny*t-tb.y;
    const dist=Math.hypot(perpX,perpY);
    if(dist>=R*2)continue; // 안 닿음

    if(t<bestT){
      bestT=t;
      // 실제 접촉점: 수구 중심이 목적구 중심에서 2R 거리인 점
      const contactT=t-Math.sqrt(4*R*R-dist*dist);
      const gx=bx+nx*contactT, gy=by+ny*contactT;
      // 두께: 1=정면, 0=스침
      const thick=1-dist/(2*R);

      // 분리각: 목적구는 접촉선 방향, 수구는 직각 방향
      const toDx=tb.x-gx, toDy=tb.y-gy;
      const toLen=Math.hypot(toDx,toDy);
      const tdx=toDx/toLen, tdy=toDy/toLen;
      // 수구 진행: 입사 벡터에서 법선 성분 제거
      const dot=nx*tdx+ny*tdy;
      const cdx=nx-dot*tdx, cdy=ny-dot*tdy;

      best={ball:tb, gx,gy, thick, dist,
        tdx,tdy, cdx,cdy, contactT};
    }
  }
  return best;
}

/** 두께를 8등분/1/3 표기로 변환 */
function thickLabel(t){
  if(t>=0.99) return '정면';
  if(t<=0.01) return '미스';
  // 1/3 체크
  if(Math.abs(t-1/3)<0.02) return '1/3';
  if(Math.abs(t-2/3)<0.02) return '2/3';
  // 8등분
  const e=Math.round(t*8);
  if(e===0)return '극얇';
  if(e===8)return '정면';
  return e+'/8';
}

/** 두께 시각화 */
function drawThickness(hit,dx,dy){
  if(!hit)return;
  const {gx,gy,thick,ball:tb,tdx,tdy,cdx,cdy}=hit;

  // 고스트 수구 (접촉 위치)
  X.beginPath();X.arc(gx,gy,R,0,Math.PI*2);
  X.strokeStyle='rgba(255,255,255,.5)';X.lineWidth=1;X.stroke();
  X.fillStyle='rgba(255,255,255,.08)';X.fill();

  // 접촉선 (수구→목적구 중심)
  X.beginPath();X.moveTo(gx,gy);X.lineTo(tb.x,tb.y);
  X.strokeStyle='rgba(255,100,100,.5)';X.lineWidth=1;X.stroke();

  // 목적구 예상 진행방향
  const tl=60;
  X.beginPath();X.moveTo(tb.x,tb.y);X.lineTo(tb.x+tdx*tl,tb.y+tdy*tl);
  X.strokeStyle='rgba(255,200,50,.6)';X.lineWidth=1.5;X.setLineDash([4,3]);X.stroke();X.setLineDash([]);

  // 수구 예상 진행방향 (두께 < 정면일 때)
  if(thick<0.95){
    const cl=Math.hypot(cdx,cdy);
    if(cl>0.01){
      const cnx=cdx/cl,cny=cdy/cl;
      X.beginPath();X.moveTo(gx,gy);X.lineTo(gx+cnx*tl,gy+cny*tl);
      X.strokeStyle='rgba(100,200,255,.6)';X.lineWidth=1.5;X.setLineDash([4,3]);X.stroke();X.setLineDash([]);
    }
  }

  // 두께 겹침 표시 (채워진 호)
  const ang=Math.atan2(tb.y-gy,tb.x-gx);
  const halfArc=Math.acos(Math.max(-1,Math.min(1,1-thick)));
  X.beginPath();X.arc(gx,gy,R,ang-halfArc,ang+halfArc);
  X.lineTo(gx,gy);X.closePath();
  X.fillStyle=`rgba(255,255,100,${0.15+thick*0.2})`;X.fill();

  // 두께 라벨
  const label=thickLabel(thick);
  const pct=Math.round(thick*100);
  X.font='bold 11px sans-serif';X.textAlign='center';X.textBaseline='bottom';
  X.fillStyle='#ffd700';
  X.fillText(`${label} (${pct}%)`,gx,gy-R-6);
}

function drawExt(h){if(!h)return;
  X.beginPath();X.moveTo(ball.x,ball.y);X.lineTo(h.x,h.y);
  X.strokeStyle='rgba(0,180,255,.6)';X.lineWidth=1.5;X.setLineDash([4,4]);X.stroke();X.setLineDash([]);
  X.beginPath();X.arc(h.x,h.y,5,0,Math.PI*2);X.fillStyle='rgba(0,180,255,.5)';X.fill();X.strokeStyle='#0af';X.lineWidth=1;X.stroke();}

function drawAim(h){if(!h)return;
  X.beginPath();X.moveTo(ball.x,ball.y);X.lineTo(h.x,h.y);
  X.strokeStyle='rgba(255,255,80,.45)';X.lineWidth=1.5;X.setLineDash([6,4]);X.stroke();X.setLineDash([]);}

function drawTraj(t,al){if(!t)return;X.globalAlpha=al||1;
  const sx=al<1?ghost.x:ball.x,sy=al<1?ghost.y:ball.y;
  X.beginPath();X.moveTo(sx,sy);X.lineTo(t.c1.x,t.c1.y);X.strokeStyle='#ff4444';X.lineWidth=2.5;X.stroke();mk(t.c1.x,t.c1.y,'#ff4444');
  if(t.oor||!t.c2||!t.c3){X.globalAlpha=1;return;}
  X.beginPath();X.moveTo(t.c1.x,t.c1.y);X.lineTo(t.c2.x,t.c2.y);X.strokeStyle='#ffaa00';X.lineWidth=2;X.stroke();mk(t.c2.x,t.c2.y,'#ffaa00');
  X.beginPath();X.moveTo(t.c2.x,t.c2.y);X.lineTo(t.c3.x,t.c3.y);X.strokeStyle='#ff6666';X.lineWidth=2;X.setLineDash([5,3]);X.stroke();X.setLineDash([]);mk(t.c3.x,t.c3.y,'#ff6666');X.globalAlpha=1;}

function drawPP(path){if(!path||path.length<2)return;
  X.beginPath();X.moveTo(path[0].x,path[0].y);for(let i=1;i<path.length;i++)X.lineTo(path[i].x,path[i].y);
  X.strokeStyle='rgba(0,255,100,.4)';X.lineWidth=2;X.setLineDash([3,5]);X.stroke();X.setLineDash([]);
  const e=path[path.length-1];X.beginPath();X.arc(e.x,e.y,4,0,Math.PI*2);
  X.fillStyle='rgba(0,255,100,.5)';X.fill();X.strokeStyle='#0f0';X.lineWidth=1;X.stroke();}

function mk(x,y,c){X.beginPath();X.arc(x,y,5,0,Math.PI*2);X.fillStyle=c;
  const a=X.globalAlpha;X.globalAlpha=Math.min(a,.6);X.fill();X.globalAlpha=a;X.strokeStyle='#fff';X.lineWidth=1;X.stroke();}

function drawTrail(){for(let i=0;i<trail.length;i++){const t=trail[i];t.a*=.994;if(t.a<.02)continue;
  X.beginPath();X.arc(t.x,t.y,2,0,Math.PI*2);X.fillStyle=`rgba(255,200,50,${t.a*.5})`;X.fill();}
  if(trail.length>2000)trail=trail.filter(t=>t.a>=.02);}

// ============================================================
//  UI
// ============================================================

function updateInfo(cv_,c1v,c3v,oor,dir){
  document.getElementById('vc').textContent=cv_!==null?cv_.toFixed(1):'-';
  document.getElementById('v1').textContent=c1v!==null?c1v.toFixed(1):'-';
  const s3=c3v!==null?c3v.toFixed(1):'-';
  document.getElementById('v3').textContent=s3+(oor?' !':'');
  if(cv_!==null&&c1v!==null&&c3v!==null){
    const rn=(dir==='left')?-tipX:tipX;
    const ts=(rn!==STD_RUNNING)?` [러닝${rn.toFixed(1)}]`:'';
    document.getElementById('vf').textContent=`${cv_.toFixed(1)} − ${c1v.toFixed(1)} = ${s3}${ts}`;
  }else document.getElementById('vf').textContent='수구 − 1쿠션 = 3쿠션';
  const d=document.getElementById('dir');d.textContent=dir==='left'?'← 좌':'우 →';
  d.style.background=dir==='left'?'rgba(100,150,255,.2)':'rgba(255,150,100,.2)';
  d.style.color=dir==='left'?'#8cf':'#fc8';
}
function resetInfo(m){document.getElementById('vc').textContent='-';document.getElementById('v1').textContent='-';
  document.getElementById('v3').textContent='-';document.getElementById('vf').textContent=m||'수구 − 1쿠션 = 3쿠션';}

function updateStats(){
  const spd=Math.hypot(ball.vx,ball.vy).toFixed(1);
  document.getElementById('stats').textContent=
    st===S.SIM?`v:${spd} ωX:${ball.sx.toFixed(1)} ωY:${ball.sy.toFixed(1)} 쿠션:${bounces}`:
    bounces>0?`완료 쿠션:${bounces}회`:'';}

// ============================================================
//  메인 렌더
// ============================================================

function render(){
  X.clearRect(0,0,cv.width,cv.height);
  drawTable();

  if(st===S.AIM){
    const c1h=calcC1(ball.x,ball.y,mouse.x,mouse.y);
    const dir=detectDir(c1h);curDir=dir;
    const sys=dir==='left'?SL:SR;
    // 쿠션 날 점 제거됨

    if(c1h){
      // 5&half 시스템 (상단 쿠션 조준 시에만)
      if(c1h.edge==='top'){
        const c1v=calcC1Val(c1h,sys);
        const ext=calcExt(ball.x,ball.y,c1h.x,c1h.y,sys);
        const cv_=ext.val;
        drawExt(ext.hit);
        if(c1v!==null&&cv_!==null){
          const traj=calcTraj(cv_,c1h,c1v,sys);
          drawTraj(traj);
          updateInfo(cv_,c1v,traj?traj.c3v:null,traj?traj.oor:false,dir);
        }else{drawAim(c1h);resetInfo();}
      }else{
        // 상단 외 쿠션: 겨냥선만 표시
        drawAim(c1h);
        resetInfo();
      }
      // 물리 예측 (모든 방향)
      if(showPP){
        let ndx=(c1h.x-ball.x),ndy=(c1h.y-ball.y);const len=Math.hypot(ndx,ndy);ndx/=len;ndy/=len;
        if(sqtOn&&tipX!==0){const sq=-tipX*P.squirt*(power/7);const cs=Math.cos(sq),sn=Math.sin(sq);
          const nx=ndx*cs-ndy*sn,ny=ndx*sn+ndy*cs;ndx=nx;ndy=ny;}
        ppPath=calcPP(ball.x,ball.y,ndx*power,ndy*power,-tipX,tipY*power*15);
        drawPP(ppPath);
      }
    }else{resetInfo();}

    // 두께 계산 및 시각화
    const aimDx=mouse.x-ball.x, aimDy=mouse.y-ball.y;
    const thickHit=calcThickness(ball.x,ball.y,aimDx,aimDy);
    drawThickness(thickHit,aimDx,aimDy);

    // 목적구 그리기 (수구 뒤에)
    drawOneBall(balls[1]);drawOneBall(balls[2]);
    drawBallWithTip(ball.x,ball.y);
  }else{
    for(let _s=0;_s<5;_s++)stepAllBalls(); // 5x 속도
    trail.push({x:ball.x,y:ball.y,a:1});
    if(allStopped())stopSim();
    // 마찰로 자연 정지 (파워14 → 최대 9쿠션)
    const sys=curDir==='left'?SL:SR;
    if(predTraj)drawTraj(predTraj,.2);
    drawTrail();
    // 3구 전부 그리기
    drawOneBall(balls[1]);drawOneBall(balls[2]);drawOneBall(ball);
  }
  updateStats();requestAnimationFrame(render);
}

// ============================================================
//  유틸리티
// ============================================================

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ============================================================
//  이벤트
// ============================================================

function gm(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*(cv.width/r.width),y:(e.clientY-r.top)*(cv.height/r.height)};}

// 3구 드래그: 가장 가까운 공 잡기
function findBallAt(p){
  let best=null,bd=R+8;
  for(const b of balls){const d=Math.hypot(p.x-b.x,p.y-b.y);if(d<bd){bd=d;best=b;}}
  return best;
}

cv.addEventListener('mousedown',e=>{
  if(st!==S.AIM)return;const p=gm(e);
  dragBall=findBallAt(p);
  if(dragBall)cv.style.cursor='grabbing';
});
cv.addEventListener('mousemove',e=>{
  const p=gm(e);
  if(dragBall&&st===S.AIM){
    dragBall.x=clamp(p.x,OX+R,OX+TW-R);
    dragBall.y=clamp(p.y,OY+R,OY+TH-R);
  }
  if(!aimLk)mouse=p;
  if(!dragBall&&st===S.AIM){
    const hov=findBallAt(p);
    cv.style.cursor=hov?'grab':'crosshair';
  }
});
cv.addEventListener('mouseup',()=>{dragBall=null;cv.style.cursor='crosshair';});
cv.addEventListener('click',e=>{
  if(st!==S.AIM)return;const p=gm(e);
  const onBall=findBallAt(p);
  if(!onBall)aimLk=!aimLk;
});
cv.addEventListener('mouseleave',()=>{dragBall=null;});

cv.addEventListener('touchstart',e=>{e.preventDefault();const p=gm(e.touches[0]);
  if(st===S.AIM)dragBall=findBallAt(p);mouse=p;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=gm(e.touches[0]);
  if(dragBall&&st===S.AIM){dragBall.x=clamp(p.x,OX+R,OX+TW-R);dragBall.y=clamp(p.y,OY+R,OY+TH-R);}
  if(!aimLk)mouse=p;},{passive:false});
cv.addEventListener('touchend',()=>{dragBall=null;});

document.addEventListener('keydown',e=>{
  // 화살표: 0.5팁 조절
  if(e.key==='ArrowLeft'){tipX=Math.max(-4,tipX-0.5);updateTipUI();e.preventDefault();return;}
  if(e.key==='ArrowRight'){tipX=Math.min(4,tipX+0.5);updateTipUI();e.preventDefault();return;}
  if(e.key==='ArrowUp'){tipY=Math.min(4,tipY+0.5);updateTipUI();e.preventDefault();return;}
  if(e.key==='ArrowDown'){tipY=Math.max(-4,tipY-0.5);updateTipUI();e.preventDefault();return;}
  // WASD: 1.0팁 조절
  if(e.key==='a'||e.key==='A'){tipX=Math.max(-4,tipX-1);updateTipUI();return;}
  if(e.key==='d'||e.key==='D'){tipX=Math.min(4,tipX+1);updateTipUI();return;}
  if(e.key==='w'||e.key==='W'){tipY=Math.min(4,tipY+1);updateTipUI();return;}
  if(e.key==='s'||e.key==='S'){tipY=Math.max(-4,tipY-1);updateTipUI();return;}
  // 숫자: tipX 직접 설정
  const n=+e.key;if(n>=1&&n<=9){tipX=(n-5);updateTipUI();return;}
  if(e.code==='Space'){e.preventDefault();st===S.SIM?stopSim():startSim();}
  if(e.key==='r'||e.key==='R')resetBall();
  if(e.key==='p'||e.key==='P')showPP=!showPP;
});

document.getElementById('pw').addEventListener('input',e=>{power=+e.target.value;document.getElementById('pv').textContent=power;});
document.getElementById('sqt').addEventListener('change',e=>{sqtOn=e.target.checked;});
document.getElementById('shoot').addEventListener('click',()=>{st===S.SIM?stopSim():startSim();});

render();
</script>
</body>
</html>
